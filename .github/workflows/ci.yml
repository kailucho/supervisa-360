name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Valores ficticios: el build de Vite no ejecuta src/lib/env.ts (que valida estas
      # variables) durante el bundling, solo lo transforma. Se definen igual para que
      # cualquier paso futuro que sí las lea en build-time no falle por su ausencia.
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Formato (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Pruebas (Vitest)
        run: npm run test

      - name: Build (tsc + Vite)
        run: npm run build
